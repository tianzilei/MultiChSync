version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s:%(lineno)d: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: multichsync.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

loggers:
  multichsync:
    level: INFO
    handlers: [console, file]
    propagate: false
  multichsync.quality:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  multichsync.fnirs:
    level: INFO
    handlers: [console]
    propagate: false
  multichsync.eeg:
    level: INFO
    handlers: [console]
    propagate: false
  multichsync.ecg:
    level: INFO
    handlers: [console]
    propagate: false
  multichsync.marker:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]